name: API Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  run-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node (No Cache)
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Newman
        run: |
          npm install -g newman newman-reporter-htmlextra

      - name: Run API Tests
        run: |
          mkdir -p reports
          newman run collections/insurance-enterprise-v1-stable.json \
          -e collections/insurance-env.json \
          -r cli,htmlextra \
          --reporter-htmlextra-export reports/report.html

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: reports/report.html